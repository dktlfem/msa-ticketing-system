# ===== Test DB (H2 In-Memory) =====
spring.datasource.url=jdbc:h2:mem:waitingroom;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS TICKETING_WAITINGROOM
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# schema.sql/data.sql \uAC19\uC740 SQL init\uC774 \uC788\uC73C\uBA74 \uD14C\uC2A4\uD2B8\uC5D0\uC11C \uC6D0\uCE58 \uC54A\uAC8C \uC2E4\uD589\uB420 \uC218 \uC788\uC5B4\uC11C \uCC28\uB2E8
spring.sql.init.mode=never

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=create-drop
# dialect \uBA85\uC2DC
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===== Logging =====
logging.level.org.hibernate.orm.jdbc.bind=TRACE