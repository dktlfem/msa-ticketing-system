server.port=8080

# DB Connection - ticketing_waitingroom \uC2A4\uD0A4\uB9C8 \uC0AC\uC6A9
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.124.100:33066/ticketing_waitingroom?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# \uC5D4\uB4DC\uD3EC\uC778\uD2B8 \uB178\uCD9C (Prometheus\uC640 Health \uCCB4\uD06C)
management.endpoints.web.exposure.include=prometheus,health

# \uC0C1\uC138\uD55C \uD5EC\uC2A4 \uCCB4\uD06C \uC815\uBCF4 \uD45C\uC2DC (\uC7A5\uC560 \uB514\uBC84\uAE45 \uC6A9\uB3C4)
management.endpoint.health.show-details=always

# \uD504\uB85C\uBA54\uD14C\uC6B0\uC2A4 \uC5D4\uB4DC\uD3EC\uC778\uD2B8 \uD65C\uC131\uD654
management.endpoint.prometheus.enabled=true

# \uBAA8\uB4E0 \uBA54\uD2B8\uB9AD\uC5D0 \uC5B4\uD50C\uB9AC\uCF00\uC774\uC158 \uC774\uB984 \uD0DC\uADF8 \uCD94\uAC00 (Grafana \uD544\uD130\uB9C1 \uCD5C\uC801\uD654)
management.metrics.tags.application=${MANAGEMENT_METRICS_TAGS_APPLICATION:waitingroom-service}

# Redis Connection (Mini PC 101\uBC88\uC9C0)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:116.41.72.131}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# (\uC120\uD0DD) \uCEE4\uB125\uC158 \uD480 \uC124\uC815: \uB300\uADDC\uBAA8 \uD2B8\uB798\uD53D \uB300\uBE44
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
# Lettuce \uCEE4\uB125\uC158 \uD480 \uC0C1\uC138 \uC124\uC815
spring.data.redis.lettuce.shutdown-timeout=200ms

# P99 \uB370\uC774\uD130 \uD65C\uC131\uD654
management.metrics.distribution.percentiles-histogram.http.server.requests=true

spring.main.web-application-type=reactive

# Redis \uC5F0\uACB0 \uBC0F \uCEE4\uB9E8\uB4DC \uD0C0\uC784\uC544\uC6C3 \uC124\uC815 (1\uBD84 -> 1\uCD08\uB85C \uB2E8\uCD95)
spring.data.redis.connect-timeout=1000ms
spring.data.redis.timeout=1000ms

# Resilience4j \uC11C\uD0B7 \uBE0C\uB808\uC774\uCEE4 - \uC880 \uB354 \uC608\uBBFC\uD558\uAC8C \uC124\uC815
# 3\uCD08 \uC774\uC0C1 \uAC78\uB9AC\uB294 \uC694\uCCAD\uC774 50%\uB97C \uB118\uC73C\uBA74 \uBC14\uB85C \uC11C\uD0B7\uC744 \uC5FD\uB2C8\uB2E4.

# Circuit Breaker \uC124\uC815
resilience4j.circuitbreaker.instances.waitingRoomService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.waitingRoomService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.waitingRoomService.failureRateThreshold=30
resilience4j.circuitbreaker.instances.waitingRoomService.slowCallDurationThreshold=1s
resilience4j.circuitbreaker.instances.waitingRoomService.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.waitingRoomService.waitDurationInOpenState=10s

# Bulkhead \uC124\uC815
resilience4j.bulkhead.instances.waitingRoomService.maxConcurrentCalls=50
# Bulkhead - \uAE30\uB2E4\uB9AC\uC9C0 \uB9D0\uACE0 \uBC14\uB85C \uCCD0\uB0B4\uAE30
resilience4j.bulkhead.instances.waitingRoomService.maxWaitDuration=0ms