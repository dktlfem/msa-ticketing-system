server.port=8080

spring.application.name=scg
spring.main.web-application-type=reactive

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://user-app:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.routes[1].id=concert-service
spring.cloud.gateway.routes[1].uri=http://concert-app:8080
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/events/**,/api/v1/schedules/**,/api/v1/seats/**

spring.cloud.gateway.routes[2].id=waitingroom-service
spring.cloud.gateway.routes[2].uri=http://waitingroom-app:8080
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/waiting-room/**

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=http://payment-app:8080
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/payments/**

management.endpoints.web.exposure.include=health,prometheus
