version: '3.8'
services:
  # 1. Nginx 리버스 프록시 서버
  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80" # 외부 트래픽을 Port 80으로 받음
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf # 🌟 Nginx 설정 파일 마운트
    depends_on:
      - app_green
    restart: always

  # 2. Blue/Green 배포를 위한 Green 서버 (초기 가동)
  app_blue:
    image: dktlfem/ci-cd-test:71 # 🌟 CI 파이프라인이 이 태그를 최신 빌드 번호로 교체할 것입니다.
    container_name: app_blue
    ports:
      - "8081:8080"
    volumes:
      - ./etc/localtime:/etc/localtime:ro
    environment:
      SERVER_PORT: 8081
    restart: always

  # 3. Blue/Green 배포를 위한 Blue 서버 (대기)
  app_green:
    image: dktlfem/ci-cd-test:71
    container_name: app_green
    ports:
      - "8082:8080"
    volumes:
      - ./etc/localtime:/etc/localtime:ro
    environment:
      SERVER_PORT: 8082
    restart: always