server.port=8080

# DB Connection - ticketing_user \uC2A4\uD0A4\uB9C8 \uC0AC\uC6A9
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.124.100:33066/ticketing_user?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# \uC5D4\uB4DC\uD3EC\uC778\uD2B8 \uB178\uCD9C (Prometheus\uC640 Health \uCCB4\uD06C)
management.endpoints.web.exposure.include=prometheus,health
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true

# \uBAA8\uB4E0 \uBA54\uD2B8\uB9AD\uC5D0 \uC560\uD50C\uB9AC\uCF00\uC774\uC158 \uC774\uB984 \uD0DC\uADF8 \uCD94\uAC00 (Grafana \uD544\uD130\uB9C1 \uCD5C\uC801\uD654)
management.metrics.tags.application=${MANAGEMENT_METRICS_TAGS_APPLICATION:user-service}

# Redis Connection (Mini PC PC 101\uBC88\uC9C0)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:192.168.124.101}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# \uCEE4\uB125\uC158 \uD480 \uC124\uC815: \uB300\uADDC\uBAA8 \uD2B8\uB798\uD53D \uB300\uBE44
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10

# Resilience4j - Circuit Breaker \uACF5\uD1B5 \uC124\uC815
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s

# aiService \uC804\uC6A9 \uC124\uC815 (default \uC0C1\uC18D)
resilience4j.circuitbreaker.instances.aiService.base-config=default
resilience4j.circuitbreaker.instances.aiService.permitted-number-of-calls-in-half-open-state=3

# Circuit Breaker \uC0C1\uD0DC\uB97C \uD5EC\uC2A4 \uCCB4\uD06C \uBC0F \uBA54\uD2B8\uB9AD\uC5D0 \uD3EC\uD568
management.health.circuitbreakers.enabled=true

# P99 \uB370\uC774\uD130 \uD65C\uC131\uD654
management.metrics.distribution.percentiles-histogram.http.server.requests=true