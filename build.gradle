plugins {
	id 'java'
	id 'org.springframework.boot' version '3.3.2'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.koesc'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

repositories {
	mavenCentral()
}

dependencies {

    implementation platform('org.springframework.boot:spring-boot-dependencies:3.3.2')

    implementation 'org.hibernate:hibernate-community-dialects:6.5.2.Final'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'jakarta.annotation:jakarta.annotation-api'

    compileOnly 'org.projectlombok:lombok'
    runtimeOnly 'com.mysql:mysql-connector-j'
    annotationProcessor platform('org.springframework.boot:spring-boot-dependencies:3.3.2')
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('bootJar') {
    // Gradle 7+ 환경에서 API 충돌을 피하기 위해 파일 권한 속성을 명시적으로 비활성화합니다.
    // 이는 파일 권한 설정 API를 호출하는 로직 자체를 우회합니다.
    archiveFile.get().setExecutable(true) // 실행 가능하도록 설정 (API 충돌 방지)
}

tasks.named('test') {
	useJUnitPlatform()
}
