server.port=8080

# DB Connection - ticketing_payment 스키마 사용
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.124.100:33066/ticketing_payment?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 엔드포인트 노출 (Prometheus와 Health 체크)
management.endpoints.web.exposure.include=prometheus,health

# 상세한 헬스 체크 정보 표시 (장애 디버깅 용도)
management.endpoint.health.show-details=always

# 프로메테우스 엔드포인트 활성화
management.endpoint.prometheus.enabled=true

# 모든 메트릭에 어플리케이션 이름 태그 추가 (Grafana 필터링 최적화)
management.metrics.tags.application=${MANAGEMENT_METRICS_TAGS_APPLICATION:payment-service}

# Redis Connection (Mini PC 101번지)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:192.168.124.101}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}

# (선택) 커넥션 풀 설정: 대규모 트래픽 대비
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10

# P99 데이터 활성화
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# TossPayments PG 연동
toss.payments.secret-key=${TOSS_PAYMENTS_SECRET_KEY:test_sk_placeholder}
toss.payments.base-url=${TOSS_PAYMENTS_BASE_URL:https://api.tosspayments.com/v1}

# Internal service clients
internal.clients.booking.base-url=${BOOKING_APP_URL:http://nginx_proxy}
internal.clients.concert.base-url=${CONCERT_APP_URL:http://nginx_proxy}

# TraceId 포함 로그 패턴 (Micrometer Tracing + Brave 자동 구성)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId:-no-trace},%X{spanId:-no-span}] [%thread] %-5level %logger{36} - %msg%n
