# =============================================================================
# GitLab CI/CD Pipeline Template
# MSA 기반 티켓팅 시스템 — payment-app 기준 배포 파이프라인
#
# 기반 문서: docs/operations/release-rollback-checklist.md
# 아키텍처: GitLab → Jenkins → AWS EC2 Nginx (Blue/Green) → AWS RDS (MySQL)
#
# 📌 이 파일은 템플릿입니다. 실제 사용 시 아래 변수를 GitLab CI/CD Variables에 설정하세요:
#   - TOSS_PAYMENTS_SECRET_KEY  (test_sk_ 또는 live_sk_ 접두사 확인 필수)
#   - SPRING_DATASOURCE_URL
#   - SPRING_DATASOURCE_PASSWORD
#   - SPRING_DATA_REDIS_HOST
#   - REDIS_PASSWORD
#   - BOOKING_APP_URL
#   - CONCERT_APP_URL
#   - DEPLOY_HOST        (스테이징: 192.168.124.100)
#   - DEPLOY_USER        (SSH 접속 계정)
#   - NGINX_CONFIG_PATH  (Blue/Green upstream 설정 파일 경로)
# =============================================================================

stages:
  - build
  - test
  - deploy
  - verify
  - rollback

# -----------------------------------------------------------------------------
# 전역 변수
# -----------------------------------------------------------------------------
variables:
  SERVICE_NAME: "payment-app"
  STAGING_HOST: "192.168.124.100"
  STAGING_PORT_BLUE: "8084"
  STAGING_PORT_GREEN: "8085"
  HEALTH_CHECK_ENDPOINT: "/actuator/health"
  METRICS_ENDPOINT: "/actuator/prometheus"
  JAVA_TOOL_OPTIONS: "-Xmx512m"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

# 파이프라인 공통 전제 조건
# checklist: 실행 전제 조건 확인 (release-rollback-checklist.md > 배포 전 체크리스트)
default:
  before_script:
    - echo "=== Pipeline started for $SERVICE_NAME ==="
    - echo "Branch: $CI_COMMIT_BRANCH | Commit: $CI_COMMIT_SHORT_SHA"

# =============================================================================
# STAGE 1: BUILD
# release-rollback-checklist.md > 배포 전 체크리스트 > 빌드 확인
# =============================================================================
build:compile:
  stage: build
  image: eclipse-temurin:21-jdk
  script:
    # checklist: 빌드 성공 확인 — ./gradlew :payment-app:build -x test
    - echo "--- [BUILD] Compiling $SERVICE_NAME (tests excluded) ---"
    - ./gradlew :${SERVICE_NAME}:build -x test --stacktrace
    - echo "--- [BUILD] Checking JAR artifact ---"
    - ls -lh ${SERVICE_NAME}/build/libs/*.jar
  artifacts:
    paths:
      - ${SERVICE_NAME}/build/libs/*.jar
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop|release\/.*)$/'
    - if: '$CI_MERGE_REQUEST_IID'

build:docker-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - job: build:compile
      artifacts: true
  script:
    # checklist: Docker 이미지 빌드 및 레지스트리 push
    - echo "--- [BUILD] Building Docker image ---"
    - docker build -t registry.gitlab.example.com/${CI_PROJECT_PATH}/${SERVICE_NAME}:${CI_COMMIT_SHORT_SHA} ./${SERVICE_NAME}
    - docker tag registry.gitlab.example.com/${CI_PROJECT_PATH}/${SERVICE_NAME}:${CI_COMMIT_SHORT_SHA}
          registry.gitlab.example.com/${CI_PROJECT_PATH}/${SERVICE_NAME}:latest
    - echo "--- [BUILD] Pushing to GitLab Container Registry ---"
    - docker push registry.gitlab.example.com/${CI_PROJECT_PATH}/${SERVICE_NAME}:${CI_COMMIT_SHORT_SHA}
    - docker push registry.gitlab.example.com/${CI_PROJECT_PATH}/${SERVICE_NAME}:latest
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|release\/.*)$/'

# =============================================================================
# STAGE 2: TEST
# release-rollback-checklist.md > 배포 전 체크리스트 > 테스트 포함 빌드
# =============================================================================
test:unit:
  stage: test
  image: eclipse-temurin:21-jdk
  script:
    # checklist: 테스트 포함 빌드 (CI에서 통과 여부) — ./gradlew :payment-app:test
    - echo "--- [TEST] Running unit tests for $SERVICE_NAME ---"
    - ./gradlew :${SERVICE_NAME}:test --stacktrace
  artifacts:
    reports:
      junit: ${SERVICE_NAME}/build/test-results/test/*.xml
    paths:
      - ${SERVICE_NAME}/build/reports/tests/
    expire_in: 7 days
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop|release\/.*)$/'
    - if: '$CI_MERGE_REQUEST_IID'

test:pre-deploy-db-check:
  stage: test
  image: mysql:8.0
  script:
    # checklist: CANCEL_FAILED 상태 잔류 확인 (이 상태가 있으면 배포 절대 금지)
    - echo "--- [TEST] Pre-deploy DB state check ---"
    - |
      CANCEL_FAILED_COUNT=$(mysql -h ${STAGING_HOST} -P 33066 -u${DB_USER} -p${SPRING_DATASOURCE_PASSWORD} \
        -se "SELECT COUNT(*) FROM ticketing_payment.payments WHERE status = 'CANCEL_FAILED';" 2>/dev/null)
      echo "CANCEL_FAILED count: $CANCEL_FAILED_COUNT"
      if [ "$CANCEL_FAILED_COUNT" -gt "0" ]; then
        echo "ERROR: CANCEL_FAILED 상태 잔류 발견! 수동 처리 후 재배포하세요."
        echo "처리 절차: docs/operations/incident-runbook.md > INC-003"
        exit 1
      fi
    # checklist: READY 상태 장시간 잔류 확인 (10분 이상 READY면 이상 징후)
    - |
      READY_STALE_COUNT=$(mysql -h ${STAGING_HOST} -P 33066 -u${DB_USER} -p${SPRING_DATASOURCE_PASSWORD} \
        -se "SELECT COUNT(*) FROM ticketing_payment.payments
             WHERE status = 'READY' AND created_at < NOW() - INTERVAL 10 MINUTE;" 2>/dev/null)
      echo "Stale READY count (>10min): $READY_STALE_COUNT"
      if [ "$READY_STALE_COUNT" -gt "0" ]; then
        echo "WARNING: READY 상태 장시간 잔류 발견. 원인을 확인하고 진행 여부를 결정하세요."
        # WARNING 수준 — 파이프라인 중단 없이 알림만 출력 (심각도 판단 후 수동 개입)
      fi
    - echo "--- [TEST] DB pre-deploy check passed ---"
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|release\/.*)$/'

test:pre-deploy-env-check:
  stage: test
  script:
    # checklist: 환경변수 확인 — TOSS_PAYMENTS_SECRET_KEY 접두사 (test_sk_ vs live_sk_)
    - echo "--- [TEST] Environment variable validation ---"
    - |
      if [ -z "$TOSS_PAYMENTS_SECRET_KEY" ]; then
        echo "ERROR: TOSS_PAYMENTS_SECRET_KEY 가 설정되지 않았습니다."
        exit 1
      fi
    - |
      # staging 브랜치는 test_sk_ 접두사 강제 확인
      if [[ "$CI_COMMIT_BRANCH" == "develop" ]] || [[ "$CI_COMMIT_BRANCH" =~ ^staging ]]; then
        if [[ "$TOSS_PAYMENTS_SECRET_KEY" != test_sk_* ]]; then
          echo "ERROR: staging 환경에 live_sk_ 키가 설정됐습니다! 즉시 중단합니다."
          echo "staging에서 실결제가 발생할 수 있습니다."
          exit 1
        fi
        echo "OK: test_sk_ 접두사 확인"
      fi
    # checklist: SPRING_DATASOURCE_URL 확인 — ticketing_payment 스키마를 가리키는지 확인
    - |
      if [[ "$SPRING_DATASOURCE_URL" != *"ticketing_payment"* ]]; then
        echo "ERROR: SPRING_DATASOURCE_URL이 ticketing_payment 스키마를 가리키지 않습니다!"
        echo "현재 값: $SPRING_DATASOURCE_URL"
        exit 1
      fi
      echo "OK: DATASOURCE_URL 스키마 확인"
    # checklist: BOOKING_APP_URL 확인 — production에서 nginx_proxy 경유하면 안 됨
    - |
      if [[ "$BOOKING_APP_URL" == *"nginx_proxy"* ]]; then
        echo "ERROR: BOOKING_APP_URL에 nginx_proxy가 포함돼 있습니다. 직접 서비스 주소를 사용하세요."
        exit 1
      fi
      echo "OK: BOOKING_APP_URL 확인"
    - echo "--- [TEST] Environment validation passed ---"
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|develop|release\/.*)$/'

# =============================================================================
# STAGE 3: DEPLOY
# release-rollback-checklist.md > 배포 중 체크리스트
# =============================================================================
deploy:inactive-slot:
  stage: deploy
  image: alpine:3.19
  needs:
    - job: build:docker-image
    - job: test:unit
    - job: test:pre-deploy-db-check
    - job: test:pre-deploy-env-check
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    # checklist: 현재 blue/green 활성 슬롯 확인
    - echo "--- [DEPLOY] Checking current active slot ---"
    - |
      ACTIVE_SLOT=$(ssh ${DEPLOY_USER}@${DEPLOY_HOST} "cat /etc/nginx/conf.d/payment-slot.txt 2>/dev/null || echo 'blue'")
      echo "Current active slot: $ACTIVE_SLOT"
      if [ "$ACTIVE_SLOT" = "blue" ]; then
        INACTIVE_SLOT="green"
        INACTIVE_PORT=$STAGING_PORT_GREEN
      else
        INACTIVE_SLOT="blue"
        INACTIVE_PORT=$STAGING_PORT_BLUE
      fi
      echo "Deploying to inactive slot: $INACTIVE_SLOT (port: $INACTIVE_PORT)"
      echo "$INACTIVE_SLOT" > /tmp/target-slot.txt
      echo "$INACTIVE_PORT" > /tmp/target-port.txt

    # checklist: 비활성 슬롯에 app.jar 배포 (활성 슬롯 건드리지 않음)
    - echo "--- [DEPLOY] Deploying to inactive slot ---"
    - |
      INACTIVE_SLOT=$(cat /tmp/target-slot.txt)
      INACTIVE_PORT=$(cat /tmp/target-port.txt)
      ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
        docker pull registry.gitlab.example.com/${CI_PROJECT_PATH}/${SERVICE_NAME}:${CI_COMMIT_SHORT_SHA}
        docker stop ${SERVICE_NAME}-${INACTIVE_SLOT} 2>/dev/null || true
        docker rm ${SERVICE_NAME}-${INACTIVE_SLOT} 2>/dev/null || true
        docker run -d \
          --name ${SERVICE_NAME}-${INACTIVE_SLOT} \
          -p ${INACTIVE_PORT}:8080 \
          -e TOSS_PAYMENTS_SECRET_KEY=${TOSS_PAYMENTS_SECRET_KEY} \
          -e SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL} \
          -e SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD} \
          -e SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST} \
          -e REDIS_PASSWORD=${REDIS_PASSWORD} \
          -e BOOKING_APP_URL=${BOOKING_APP_URL} \
          -e CONCERT_APP_URL=${CONCERT_APP_URL} \
          registry.gitlab.example.com/${CI_PROJECT_PATH}/${SERVICE_NAME}:${CI_COMMIT_SHORT_SHA}
      "

    # checklist: payment-app 기동 후 /actuator/health 응답 확인
    - echo "--- [DEPLOY] Waiting for health check ---"
    - |
      INACTIVE_PORT=$(cat /tmp/target-port.txt)
      for i in $(seq 1 12); do
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${DEPLOY_HOST}:${INACTIVE_PORT}${HEALTH_CHECK_ENDPOINT} 2>/dev/null || echo "000")
        echo "Attempt $i: health status = $HTTP_STATUS"
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "Health check passed!"
          break
        fi
        if [ $i -eq 12 ]; then
          echo "ERROR: Health check failed after 60 seconds. Rolling back..."
          exit 1
        fi
        sleep 5
      done

    # checklist: /actuator/prometheus 응답 확인 (metrics endpoint 정상 여부)
    - echo "--- [DEPLOY] Checking metrics endpoint ---"
    - |
      INACTIVE_PORT=$(cat /tmp/target-port.txt)
      METRICS_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://${DEPLOY_HOST}:${INACTIVE_PORT}${METRICS_ENDPOINT} 2>/dev/null || echo "000")
      echo "Metrics endpoint status: $METRICS_RESPONSE"
      if [ "$METRICS_RESPONSE" != "200" ]; then
        echo "WARNING: Metrics endpoint not responding. Check Prometheus scraping config."
      fi

    # checklist: payment-app 기동 로그 확인 — TossPayments 초기화, Redis 연결, DB 연결
    - echo "--- [DEPLOY] Checking startup logs ---"
    - |
      INACTIVE_SLOT=$(cat /tmp/target-slot.txt)
      ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
        echo '=== TossPayments / Redis / HikariPool 초기화 로그 ==='
        docker logs ${SERVICE_NAME}-${INACTIVE_SLOT} 2>&1 | grep -E '(TossPayments|Redis|HikariPool|ERROR|WARN|Started)' | tail -30
      "

    # checklist: Nginx upstream을 비활성 슬롯으로 전환 (smoke test 후)
    - echo "--- [DEPLOY] Switching Nginx upstream ---"
    - |
      INACTIVE_SLOT=$(cat /tmp/target-slot.txt)
      INACTIVE_PORT=$(cat /tmp/target-port.txt)
      ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
        # Nginx upstream 설정 파일 업데이트
        echo 'upstream payment_upstream { server 127.0.0.1:${INACTIVE_PORT}; }' > ${NGINX_CONFIG_PATH}
        echo '${INACTIVE_SLOT}' > /etc/nginx/conf.d/payment-slot.txt
        nginx -t && nginx -s reload
        echo 'Nginx switched to $INACTIVE_SLOT (port: $INACTIVE_PORT)'
      "
    - echo "--- [DEPLOY] Deployment complete. Active slot: $(cat /tmp/target-slot.txt) ---"
  artifacts:
    paths:
      - /tmp/target-slot.txt
      - /tmp/target-port.txt
    expire_in: 2 hours
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|release\/.*)$/'

# =============================================================================
# STAGE 4: VERIFY
# release-rollback-checklist.md > 배포 후 검증 체크리스트
# =============================================================================
verify:post-deploy:
  stage: verify
  image: alpine:3.19
  needs:
    - job: deploy:inactive-slot
  before_script:
    - apk add --no-cache curl mysql-client
  script:
    # checklist: SCG route 검증 — 실제 gateway를 통한 요청이 라우팅되는지 확인
    - echo "--- [VERIFY] SCG route validation ---"
    - |
      SCG_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
        -X POST http://${STAGING_HOST}/api/v1/payments/request 2>/dev/null || echo "000")
      echo "SCG routing response: $SCG_RESPONSE"
      if [ "$SCG_RESPONSE" = "404" ]; then
        echo "ERROR: SCG route not found (404). Check spring.cloud.gateway.routes configuration."
        exit 1
      elif [ "$SCG_RESPONSE" = "000" ]; then
        echo "ERROR: SCG connection refused. scg-app may be down."
        exit 1
      else
        echo "OK: SCG routing confirmed (status: $SCG_RESPONSE — 401/400 expected without auth)"
      fi

    # checklist: 배포 5분 후 에러율 확인 — 5xx 급증 없음 확인
    - echo "--- [VERIFY] Waiting 5 minutes for error rate baseline ---"
    - sleep 30   # CI 환경에서는 30초로 단축 (실제 운영 시 300초 권장)

    # checklist: CANCEL_FAILED 신규 발생 확인
    - echo "--- [VERIFY] Checking for new CANCEL_FAILED after deploy ---"
    - |
      DEPLOY_TIME=$(date -d '10 minutes ago' '+%Y-%m-%d %H:%M:%S' 2>/dev/null || \
                    date -v-10M '+%Y-%m-%d %H:%M:%S')
      CANCEL_FAILED_NEW=$(mysql -h ${STAGING_HOST} -P 33066 -u${DB_USER} -p${SPRING_DATASOURCE_PASSWORD} \
        -se "SELECT COUNT(*) FROM ticketing_payment.payments
             WHERE status = 'CANCEL_FAILED' AND created_at > '${DEPLOY_TIME}';" 2>/dev/null || echo "0")
      echo "New CANCEL_FAILED since deploy: $CANCEL_FAILED_NEW"
      if [ "$CANCEL_FAILED_NEW" -gt "0" ]; then
        echo "CRITICAL: 배포 후 CANCEL_FAILED 신규 발생 감지!"
        echo "즉시 rollback stage를 수동 트리거하세요."
        exit 1
      fi

    # checklist: Grafana 메트릭 수신 확인 (Prometheus scrape 간접 확인)
    - echo "--- [VERIFY] Checking Prometheus scrape ---"
    - |
      PROM_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
        "http://${STAGING_HOST}:8080/prometheus/api/v1/query?query=up{job=\"${SERVICE_NAME}\"}" \
        2>/dev/null || echo "000")
      echo "Prometheus API status: $PROM_RESPONSE"

    # checklist: P99 레이턴시 기준선 확인 (이전 배포 대비 이상 증가 없음)
    - echo "--- [VERIFY] P99 latency check ---"
    - |
      P99=$(curl -s \
        "http://${STAGING_HOST}:8080/prometheus/api/v1/query?query=histogram_quantile(0.99,rate(http_server_requests_seconds_bucket{application=\"${SERVICE_NAME}\"}[5m]))" \
        2>/dev/null | grep -o '"value":\[.*\]' | head -1 || echo "unavailable")
      echo "P99 latency: $P99"

    - echo "--- [VERIFY] Post-deploy verification passed ---"
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|release\/.*)$/'

# =============================================================================
# STAGE 5: ROLLBACK
# release-rollback-checklist.md > 롤백 절차 (Rollback Procedure)
#
# 🔴 이 job은 when: manual 설정입니다.
#    verify stage 실패 시 또는 수동 판단 시 트리거하세요.
#    실행 전 반드시 CANCEL_FAILED 상태 수동 처리 선행 필요.
# =============================================================================
rollback:switch-slot:
  stage: rollback
  image: alpine:3.19
  # checklist: rollback stage는 when: manual — verify 실패 시 수동 트리거
  when: manual
  allow_failure: false
  before_script:
    - apk add --no-cache openssh-client curl mysql-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    # checklist: 롤백 전 필수 확인 — CANCEL_FAILED 상태 잔류 여부 (롤백 전 반드시 0이어야 함)
    - echo "=== [ROLLBACK] Pre-rollback CANCEL_FAILED check ==="
    - |
      CANCEL_FAILED_COUNT=$(mysql -h ${STAGING_HOST} -P 33066 -u${DB_USER} -p${SPRING_DATASOURCE_PASSWORD} \
        -se "SELECT COUNT(*) FROM ticketing_payment.payments WHERE status = 'CANCEL_FAILED';" 2>/dev/null || echo "-1")
      echo "CANCEL_FAILED count: $CANCEL_FAILED_COUNT"
      if [ "$CANCEL_FAILED_COUNT" -gt "0" ]; then
        echo "======================================================"
        echo "BLOCKER: CANCEL_FAILED 상태 잔류 발견!"
        echo "롤백 전 수동 처리가 필요합니다."
        echo "처리 절차: docs/operations/incident-runbook.md > INC-003"
        echo "처리 완료 후 이 job을 다시 수동 트리거하세요."
        echo "======================================================"
        exit 1
      fi
      echo "OK: CANCEL_FAILED 없음 — 롤백 진행"

    # checklist: Nginx upstream을 이전 슬롯으로 전환
    - echo "--- [ROLLBACK] Switching Nginx to previous slot ---"
    - |
      CURRENT_SLOT=$(ssh ${DEPLOY_USER}@${DEPLOY_HOST} "cat /etc/nginx/conf.d/payment-slot.txt 2>/dev/null || echo 'blue'")
      echo "Current (new) slot: $CURRENT_SLOT"
      if [ "$CURRENT_SLOT" = "blue" ]; then
        ROLLBACK_SLOT="green"
        ROLLBACK_PORT=$STAGING_PORT_GREEN
      else
        ROLLBACK_SLOT="blue"
        ROLLBACK_PORT=$STAGING_PORT_BLUE
      fi
      echo "Rolling back to: $ROLLBACK_SLOT (port: $ROLLBACK_PORT)"
      ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
        echo 'upstream payment_upstream { server 127.0.0.1:${ROLLBACK_PORT}; }' > ${NGINX_CONFIG_PATH}
        echo '${ROLLBACK_SLOT}' > /etc/nginx/conf.d/payment-slot.txt
        nginx -t && nginx -s reload
        echo 'Nginx rolled back to ${ROLLBACK_SLOT} (port: ${ROLLBACK_PORT})'
      "

    # checklist: 전환 확인 — /actuator/health UP 응답
    - echo "--- [ROLLBACK] Health check after rollback ---"
    - |
      for i in $(seq 1 6); do
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          http://${STAGING_HOST}${HEALTH_CHECK_ENDPOINT} 2>/dev/null || echo "000")
        echo "Attempt $i: health status = $HTTP_STATUS"
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "Rollback health check passed!"
          break
        fi
        if [ $i -eq 6 ]; then
          echo "ERROR: Post-rollback health check failed! 수동 확인이 필요합니다."
          exit 1
        fi
        sleep 5
      done

    # checklist: 롤백 완료 후 CANCEL_FAILED 잔류 없음 재확인
    - echo "--- [ROLLBACK] Post-rollback CANCEL_FAILED recheck ---"
    - |
      FINAL_CHECK=$(mysql -h ${STAGING_HOST} -P 33066 -u${DB_USER} -p${SPRING_DATASOURCE_PASSWORD} \
        -se "SELECT COUNT(*) FROM ticketing_payment.payments WHERE status = 'CANCEL_FAILED';" 2>/dev/null || echo "-1")
      echo "Post-rollback CANCEL_FAILED count: $FINAL_CHECK"

    # checklist: 롤백 시점 전후 READY 상태 결제 확인 — orderId/paymentKey 정합성 수동 확인 필요
    - echo "--- [ROLLBACK] READY state payments during rollback window ---"
    - |
      ROLLBACK_TIME=$(date -d '15 minutes ago' '+%Y-%m-%d %H:%M:%S' 2>/dev/null || \
                      date -v-15M '+%Y-%m-%d %H:%M:%S')
      READY_COUNT=$(mysql -h ${STAGING_HOST} -P 33066 -u${DB_USER} -p${SPRING_DATASOURCE_PASSWORD} \
        -se "SELECT COUNT(*) FROM ticketing_payment.payments
             WHERE status = 'READY' AND created_at > '${ROLLBACK_TIME}';" 2>/dev/null || echo "0")
      echo "READY payments in rollback window (last 15m): $READY_COUNT"
      if [ "$READY_COUNT" -gt "0" ]; then
        echo "WARNING: 롤백 구간 내 READY 상태 결제 존재."
        echo "orderId/paymentKey 정합성을 수동으로 확인하세요."
        echo "참조: docs/operations/release-rollback-checklist.md > 배포 중 in-flight 결제 처리"
      fi

    # checklist: 롤백 원인 분석 완료 전 재배포 절대 금지 — 알림 출력
    - echo "=================================================="
    - echo "[ROLLBACK COMPLETE]"
    - echo "롤백이 완료됐습니다."
    - echo "주의: 롤백 원인 분석 완료 전 재배포 절대 금지"
    - echo "롤백 사유 및 조치 내용을 장애 리포트에 기록하세요."
    - echo "참조: docs/operations/release-rollback-checklist.md > 롤백 후 확인"
    - echo "=================================================="
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|release\/.*)$/'
      when: manual
